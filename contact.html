<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Nova Studio</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="page-header">
    <nav class="navbar">
      <img src="Images/nova logo.png" alt="Nova Studio logo" class="site-logo">

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="over-ons.html">Over ons</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <div class="page-header-content">
      <h1>Contact</h1>
      <p>Neem contact met ons op voor een vrijblijvende kennismaking.</p>
    </div>
  </header>

  <main>
    <section class="section contact">
      <h2>Stuur ons een bericht</h2>
      <p>Laat je gegevens achter en we nemen contact met je op.</p>

      <form id="contactForm">
        <input type="text" placeholder="Naam" required />
        <input type="email" placeholder="E-mailadres" required />
        <textarea placeholder="Vertel kort wat je nodig hebt" required></textarea>
        <button type="submit">Verstuur aanvraag</button>
      </form>

      <p id="formMessage"></p>
    </section>
  </main>

  <footer>
    <p>© 2026 Nova Studio. Alle rechten voorbehouden.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
